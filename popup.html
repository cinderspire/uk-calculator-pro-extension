<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { width: 360px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f5ff; color: #333; }
.header { background: linear-gradient(135deg, #6B46C1, #9333EA); color: white; padding: 14px 16px; text-align: center; }
.header h1 { font-size: 16px; font-weight: 700; }
.header p { font-size: 11px; opacity: 0.85; margin-top: 2px; }
.tabs { display: flex; background: white; border-bottom: 2px solid #e0d5ff; }
.tab { flex: 1; padding: 10px 4px; text-align: center; font-size: 11px; font-weight: 600; cursor: pointer; color: #666; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
.tab.active { color: #6B46C1; border-bottom-color: #6B46C1; background: #f8f5ff; }
.tab:hover { color: #6B46C1; }
.panel { display: none; padding: 14px 16px; }
.panel.active { display: block; }
label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 4px; margin-top: 10px; }
label:first-child { margin-top: 0; }
input, select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
input:focus, select:focus { outline: none; border-color: #6B46C1; box-shadow: 0 0 0 2px rgba(107,70,193,0.15); }
.btn { width: 100%; padding: 10px; margin-top: 12px; background: linear-gradient(135deg, #6B46C1, #9333EA); color: white; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn:hover { opacity: 0.9; }
.btn-outline { background: white; color: #6B46C1; border: 1px solid #6B46C1; }
.result { background: white; border-left: 3px solid #6B46C1; padding: 10px 12px; margin-top: 10px; border-radius: 4px; font-size: 12px; line-height: 1.6; display: none; }
.result .big { font-size: 18px; font-weight: 700; color: #6B46C1; }
.footer { text-align: center; padding: 10px; font-size: 11px; border-top: 1px solid #e0d5ff; }
.footer a { color: #6B46C1; text-decoration: none; font-weight: 600; }
.cb { padding: 10px 4px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.cb:hover { opacity: 0.85; transform: scale(0.97); }
.cb:active { transform: scale(0.93); }
.cb.num { background: #f3f4f6; color: #1f2937; }
.cb.op { background: #6B46C1; color: white; }
.cb.eq { background: linear-gradient(135deg, #6B46C1, #9333EA); color: white; font-size: 16px; }
.cb.fn { background: #e0d5ff; color: #6B46C1; font-size: 12px; }
.cb.cm { background: #f0ebff; color: #7c3aed; font-size: 11px; }
.pct-card { background: white; border-radius: 8px; padding: 10px; margin-bottom: 8px; border: 1px solid #e5e7eb; }
.pct-card h3 { font-size: 12px; color: #6B46C1; margin-bottom: 6px; }
.pct-row { display: flex; gap: 6px; align-items: center; }
.pct-row input { flex: 1; padding: 7px 8px; font-size: 12px; }
.pct-row span { font-size: 12px; color: #666; white-space: nowrap; }
.pct-result { font-size: 14px; font-weight: 700; color: #6B46C1; margin-top: 4px; min-height: 20px; }
</style>
</head>
<body>
<div class="header">
  <h1>UK Calculator Pro</h1>
  <p>Tax, VAT, Percentage & More | 2025/26</p>
</div>

<div class="tabs">
  <div class="tab active" data-panel="calc">Calc</div>
  <div class="tab" data-panel="pct">%</div>
  <div class="tab" data-panel="tax">Tax</div>
  <div class="tab" data-panel="vat">VAT</div>
  <div class="tab" data-panel="convert">Convert</div>
</div>

<!-- ADVANCED CALCULATOR -->
<div class="panel active" id="calc">
  <div id="calcDisplay" style="background:#1a1a2e;color:#fff;padding:12px 14px;border-radius:8px;margin-bottom:8px;min-height:60px;text-align:right;font-family:'SF Mono',Consolas,monospace">
    <div id="calcExpr" style="font-size:11px;color:#9ca3af;min-height:14px"></div>
    <div id="calcScreen" style="font-size:28px;font-weight:700;margin-top:2px">0</div>
  </div>
  <div id="calcHistory" style="font-size:10px;color:#888;margin-bottom:6px;max-height:32px;overflow-y:auto"></div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px">
    <button class="cb cm" data-action="mc">MC</button>
    <button class="cb cm" data-action="mr">MR</button>
    <button class="cb cm" data-action="mplus">M+</button>
    <button class="cb cm" data-action="mminus">M−</button>
    <button class="cb fn" data-action="percent">%</button>
    <button class="cb fn" data-action="sqrt">√</button>
    <button class="cb fn" data-action="pow">x²</button>
    <button class="cb op" data-action="clear">C</button>
    <button class="cb num" data-digit="7">7</button>
    <button class="cb num" data-digit="8">8</button>
    <button class="cb num" data-digit="9">9</button>
    <button class="cb op" data-op="/">÷</button>
    <button class="cb num" data-digit="4">4</button>
    <button class="cb num" data-digit="5">5</button>
    <button class="cb num" data-digit="6">6</button>
    <button class="cb op" data-op="*">×</button>
    <button class="cb num" data-digit="1">1</button>
    <button class="cb num" data-digit="2">2</button>
    <button class="cb num" data-digit="3">3</button>
    <button class="cb op" data-op="-">−</button>
    <button class="cb num" data-digit="0">0</button>
    <button class="cb num" data-digit=".">.</button>
    <button class="cb eq" data-action="equals">=</button>
    <button class="cb op" data-op="+">+</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:4px">
    <button class="cb fn" data-action="inv">1/x</button>
    <button class="cb fn" data-action="negate">±</button>
    <button class="cb fn" data-action="back">⌫</button>
    <button class="cb fn" data-action="tip">Tip</button>
  </div>
</div>

<!-- PERCENTAGE CALCULATOR -->
<div class="panel" id="pct">
  <div class="pct-card">
    <h3>What is X% of Y?</h3>
    <div class="pct-row">
      <input type="number" id="pct1a" placeholder="10" step="any">
      <span>% of</span>
      <input type="number" id="pct1b" placeholder="200" step="any">
    </div>
    <div class="pct-result" id="pct1r"></div>
  </div>
  <div class="pct-card">
    <h3>X is what % of Y?</h3>
    <div class="pct-row">
      <input type="number" id="pct2a" placeholder="25" step="any">
      <span>is what % of</span>
      <input type="number" id="pct2b" placeholder="200" step="any">
    </div>
    <div class="pct-result" id="pct2r"></div>
  </div>
  <div class="pct-card">
    <h3>% Change (from → to)</h3>
    <div class="pct-row">
      <input type="number" id="pct3a" placeholder="80" step="any">
      <span>→</span>
      <input type="number" id="pct3b" placeholder="100" step="any">
    </div>
    <div class="pct-result" id="pct3r"></div>
  </div>
  <div class="pct-card">
    <h3>Add/Remove % from amount</h3>
    <div class="pct-row">
      <input type="number" id="pct4a" placeholder="150" step="any">
      <span>+/−</span>
      <input type="number" id="pct4b" placeholder="20" step="any">
      <span>%</span>
    </div>
    <div class="pct-result" id="pct4r"></div>
  </div>
  <div style="text-align:center;margin-top:6px">
    <a href="https://ukcalculator.com/percentage-calculator.html" target="_blank" style="color:#6B46C1;font-size:11px;font-weight:600;text-decoration:none">Full Percentage Calculator →</a>
  </div>
</div>

<!-- TAX CALCULATOR -->
<div class="panel" id="tax">
  <label>Annual Gross Salary (£)</label>
  <input type="number" id="taxSalary" placeholder="e.g. 35000">
  <label>Region</label>
  <select id="taxRegion">
    <option value="england">England/Wales/NI</option>
    <option value="scotland">Scotland</option>
  </select>
  <button class="btn" id="calcTax">Calculate Take-Home</button>
  <div class="result" id="taxResult"></div>
</div>

<!-- VAT CALCULATOR -->
<div class="panel" id="vat">
  <label>Amount (£)</label>
  <input type="number" id="vatAmount" placeholder="e.g. 100.00" step="0.01">
  <label>VAT Rate</label>
  <select id="vatRate">
    <option value="20">20% (Standard)</option>
    <option value="5">5% (Reduced)</option>
    <option value="0">0% (Zero)</option>
  </select>
  <button class="btn" id="addVat">Add VAT</button>
  <button class="btn btn-outline" id="removeVat" style="margin-top:6px">Remove VAT</button>
  <div class="result" id="vatResult"></div>
</div>

<!-- UNIT CONVERTER -->
<div class="panel" id="convert">
  <label>Value</label>
  <input type="number" id="convVal" placeholder="Enter number" step="any">
  <label>Convert</label>
  <select id="convType">
    <option value="kg_st">KG → Stone & Pounds</option>
    <option value="st_kg">Stone → KG</option>
    <option value="cm_in">CM → Inches</option>
    <option value="in_cm">Inches → CM</option>
    <option value="mi_km">Miles → KM</option>
    <option value="km_mi">KM → Miles</option>
    <option value="lb_kg">Pounds → KG</option>
    <option value="kg_lb">KG → Pounds</option>
    <option value="c_f">°C → °F</option>
    <option value="f_c">°F → °C</option>
    <option value="l_gal">Litres → Gallons</option>
    <option value="gal_l">Gallons → Litres</option>
  </select>
  <button class="btn" id="doConvert">Convert</button>
  <div class="result" id="convResult"></div>
</div>

<div class="footer">
  <a href="https://ukcalculator.com" target="_blank">2500+ Calculators at ukcalculator.com →</a>
</div>

<script src="popup.js"></script>
</body>
</html>
